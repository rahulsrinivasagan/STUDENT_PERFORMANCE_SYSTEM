{% extends "base.html" %}

{% block title %}Add MCQ Question - Student Performance Analysis System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h2 class="card-title mb-1">Add MCQ Question</h2>
                        <p class="text-muted">Subject: <strong>{{ subject.name }}</strong></p>
                    </div>
                    <a href="{{ url_for('teacher.dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label for="question" class="form-label">Question <span class="text-danger">*</span></label>
                        <textarea class="form-control" id="question" name="question" rows="3" placeholder="Enter the MCQ question" required></textarea>
                    </div>
                    
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label for="option_a" class="form-label">Option A <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="option_a" name="option_a" placeholder="Option A" required>
                        </div>
                        <div class="col-md-6">
                            <label for="option_b" class="form-label">Option B <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="option_b" name="option_b" placeholder="Option B" required>
                        </div>
                        <div class="col-md-6">
                            <label for="option_c" class="form-label">Option C <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="option_c" name="option_c" placeholder="Option C" required>
                        </div>
                        <div class="col-md-6">
                            <label for="option_d" class="form-label">Option D <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="option_d" name="option_d" placeholder="Option D" required>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="correct_answer" class="form-label">Correct Answer <span class="text-danger">*</span></label>
                        <select class="form-select" id="correct_answer" name="correct_answer" required>
                            <option value="">Select correct option...</option>
                            <option value="A">Option A</option>
                            <option value="B">Option B</option>
                            <option value="C">Option C</option>
                            <option value="D">Option D</option>
                        </select>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Add MCQ Question</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
