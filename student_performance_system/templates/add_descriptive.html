{% extends "base.html" %}

{% block title %}Add Descriptive Question - Student Performance Analysis System{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Add Descriptive Question - {{ subject.name }}</h2>
    <form method="POST">
        <div class="form-group">
            <label for="question">Question:</label>
            <textarea id="question" name="question" required></textarea>
        </div>
        
        <div class="form-group">
            <label for="marks">Marks:</label>
            <input type="number" id="marks" name="marks" min="1" required>
        </div>
        
        <div class="form-group">
            <label for="keywords">Keywords (comma-separated):</label>
            <textarea id="keywords" name="keywords" placeholder="e.g., right triangle, hypotenuse, squares" required></textarea>
        </div>
        
        <button type="submit" class="btn btn-primary">Add Question</button>
    </form>
</div>
{% endblock %}
