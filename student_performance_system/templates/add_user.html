{% extends "base.html" %}

{% block title %}Add User - Student Performance Analysis System{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h2>Add New User</h2>
                <p class="text-muted">Create a new student or teacher account.</p>
            </div>
            <a href="{{ url_for('admin.manage_users') }}" class="btn btn-outline-secondary">Back to Users</a>
        </div>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <form method="POST" class="needs-validation" novalidate>
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" id="username" name="username" class="form-control" placeholder="Enter username" required>
                        <small class="text-muted">Must be unique</small>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email (optional)</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="Enter email">
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="Enter a strong password" required>
                        <small class="text-muted">At least 6 characters recommended</small>
                    </div>

                    <div class="mb-4">
                        <label for="role" class="form-label">Role</label>
                        <select id="role" name="role" class="form-select" required>
                            <option value="">Select user role...</option>
                            <option value="student">👨‍🎓 Student</option>
                            <option value="teacher">👨‍🏫 Teacher</option>
                        </select>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-user-plus me-2"></i>Create User
                        </button>
                        <a href="{{ url_for('admin.manage_users') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
