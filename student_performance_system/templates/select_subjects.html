{% extends "base.html" %}

{% block title %}Select Subjects - Student Performance Analysis System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title mb-3">Select Your Subjects</h2>
                <form method="POST">
                    <div class="row g-3">
                        {% for subject in subjects %}
                            <div class="col-md-6">
                                <div class="form-check card p-3">
                                    <input class="form-check-input" type="checkbox" id="subject_{{ subject.id }}" name="subjects" value="{{ subject.id }}" {% if subject.id in selected_ids %}checked{% endif %}>
                                    <label class="form-check-label ms-2" for="subject_{{ subject.id }}">{{ subject.name }}</label>
                                </div>
                            </div>
                        {% endfor %}
                    </div>
                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">Save Subjects</button>
                        <a href="{{ url_for('student.dashboard') }}" class="btn btn-outline-secondary ms-2">Back to Dashboard</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
